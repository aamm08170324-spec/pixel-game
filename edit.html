<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Pixel Auto RPG - Sprite System</title>
    <script src="masterData.js"></script>
    <style>
        /* 基本スタイル（前回と同じ） */
        body { background: #0d1117; color: #c9d1d9; font-family: sans-serif; margin: 0; font-size: 13px; overflow: hidden; }
        .main-layout { display: grid; grid-template-columns: 260px 1fr 420px; gap: 15px; padding: 15px; height: 98vh; }
        .panel { background: #161b22; padding: 15px; border-radius: 8px; border: 1px solid #30363d; overflow-y: auto; }
        
        /* 【魔法の部分】スプライト表示用のクラス */
        .sprite-icon {
            width: 32px; height: 32px;
            background-image: url('images/icons/all_icons.png');
            background-repeat: no-repeat;
            display: inline-block;
            image-rendering: pixelated; /* ドット絵をクッキリさせる */
            zoom: 1.5; /* 表示サイズを少し大きく */
        }
        
        .slot { display: flex; align-items: center; gap: 10px; padding: 10px; margin-bottom: 8px; background: #21262d; border-radius: 6px; cursor: pointer; border: 2px solid transparent; }
        .slot.active { border-color: #58a6ff; }
        
        /* モーダル関連 */
        #icon-modal { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:#161b22; border:2px solid #58a6ff; padding:20px; z-index:100; border-radius:10px; width:400px; }
        .icon-grid { display:grid; grid-template-columns: repeat(5, 1fr); gap:10px; margin-top:10px; }
        .modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:90; }
        
        .field-group { margin-bottom: 12px; }
        input, select, textarea { background: #0d1117; color: #c9d1d9; border: 1px solid #30363d; padding: 8px; border-radius: 4px; width: 100%; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; background: #238636; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="modal-overlay" class="modal-overlay" onclick="closeModal()"></div>
<div id="icon-modal">
    <h3>キャラクターを選択</h3>
    <div id="icon-selection-root" class="icon-grid"></div>
    <button onclick="closeModal()" style="margin-top:15px;">閉じる</button>
</div>

<div class="main-layout">
    <div class="panel">
        <h3>パーティ編成</h3>
        <div id="slots"></div>
        <button class="btn" style="background:#8957e5;" onclick="saveToStorage()">保存して出発</button>
    </div>

    <div class="panel">
        <div style="text-align:center; margin-bottom:20px;">
            <div id="main-icon-view" style="margin-bottom:10px;"></div>
            <button class="btn" style="width:auto; padding:5px 15px;" onclick="openModal()">見た目を変える</button>
        </div>
        
        <div class="field-group"><label>名前</label><input type="text" id="name-in" oninput="sync()"></div>
        <div class="field-group"><label>ニックネーム</label><input type="text" id="nick-in" oninput="sync()"></div>
        <div style="display:flex; gap:10px;">
            <div class="field-group" style="flex:1;"><label>性別</label>
                <select id="gender-in" onchange="sync()"><option>男</option><option>女</option><option>その他</option></select>
            </div>
            <div class="field-group" style="flex:1;"><label>年齢</label><input type="number" id="age-in" oninput="sync()"></div>
        </div>
        <div class="field-group"><label>プロフィール</label><textarea id="bio-in" oninput="sync()"></textarea></div>
    </div>

    <div class="panel">
        <h3>作戦設定 (GAMBIT)</h3>
        <div id="gambit-container"></div>
    </div>
</div>

<script>
    const conf = MASTER_DATA.spriteConfig;
    let currentIdx = 0;
    let partyData = Array(6).fill(null).map((_, i) => ({
        name: `勇者${i+1}`, nick: "", gender: "男", age: 20, bio: "",
        iconIdx: i // スプライト画像の中の何番目か
    }));

    // スプライトの座標を計算して背景画像の位置を返す関数
    function getSpriteStyle(index) {
        const row = Math.floor(index / conf.columns);
        const col = index % conf.columns;
        const x = col * conf.gridSize;
        const y = row * conf.gridSize;
        return `background-position: -${x}px -${y}px;`;
    }

    function init() {
        // モーダル内のアイコン一覧を生成
        const root = document.getElementById('icon-selection-root');
        for(let i=0; i<20; i++) { // 20人分
            const div = document.createElement('div');
            div.className = 'sprite-icon';
            div.style.cssText = getSpriteStyle(i) + "cursor:pointer; transform:scale(1.5);";
            div.onclick = () => { partyData[currentIdx].iconIdx = i; closeModal(); refresh(); };
            root.appendChild(div);
        }
        refresh();
    }

    function refresh() {
        const p = partyData[currentIdx];
        document.getElementById('name-in').value = p.name;
        document.getElementById('nick-in').value = p.nick;
        document.getElementById('gender-in').value = p.gender;
        document.getElementById('age-in').value = p.age;
        document.getElementById('bio-in').value = p.bio;

        // メインアイコン表示
        const view = document.getElementById('main-icon-view');
        view.innerHTML = `<div class="sprite-icon" style="${getSpriteStyle(p.iconIdx)} zoom:3;"></div>`;

        // 左スロット表示
        const sDiv = document.getElementById('slots');
        sDiv.innerHTML = partyData.map((pd, i) => `
            <div class="slot ${i===currentIdx?'active':''}" onclick="currentIdx=${i};refresh();">
                <div class="sprite-icon" style="${getSpriteStyle(pd.iconIdx)}"></div>
                <div><b>${pd.name}</b></div>
            </div>`).join('');
    }

    function sync() {
        const p = partyData[currentIdx];
        p.name = document.getElementById('name-in').value;
        p.nick = document.getElementById('nick-in').value;
        p.gender = document.getElementById('gender-in').value;
        p.age = document.getElementById('age-in').value;
        p.bio = document.getElementById('bio-in').value;
        refresh();
    }

    function openModal() { 
        document.getElementById('icon-modal').style.display = 'block';
        document.getElementById('modal-overlay').style.display = 'block';
    }
    function closeModal() { 
        document.getElementById('icon-modal').style.display = 'none';
        document.getElementById('modal-overlay').style.display = 'none';
    }

    init();
</script>
</body>
</html>
