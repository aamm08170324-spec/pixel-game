<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Pixel Auto RPG - Professional Editor</title>
    <script src="masterData.js"></script>
    <style>
        body { background: #0d1117; color: #c9d1d9; font-family: sans-serif; margin: 0; display: flex; justify-content: center; }
        .main-layout { display: grid; grid-template-columns: 260px 1fr 400px; gap: 15px; padding: 15px; width: 1200px; height: 95vh; }
        .panel { background: #161b22; padding: 20px; border-radius: 8px; border: 1px solid #30363d; overflow-y: auto; }
        
        /* プレビューアイコン */
        .icon-preview { width: 64px; height: 64px; border: 2px solid #58a6ff; margin: 10px auto; background-size: cover; image-rendering: pixelated; }
        
        /* プリセットアイコン表示用 (CSSスプライト) */
        .sprite-item {
            width: 32px; height: 32px;
            background-image: url('images/icons/all_icons.png');
            background-repeat: no-repeat;
            display: inline-block;
            cursor: pointer;
            border: 1px solid #30363d;
            image-rendering: pixelated;
        }
        .sprite-item:hover { border-color: #58a6ff; }

        /* モーダル */
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); }
        .modal-content { background: #161b22; margin: 10% auto; padding: 20px; border: 1px solid #58a6ff; width: 450px; border-radius: 10px; }
        .icon-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; max-height: 300px; overflow-y: auto; padding: 10px; background: #0d1117; }

        .btn { background: #238636; color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; width: 100%; margin-top: 10px; }
        .btn-outline { background: transparent; border: 1px solid #30363d; color: #58a6ff; }
        .slot { display: flex; align-items: center; gap: 10px; padding: 10px; background: #21262d; margin-bottom: 5px; cursor: pointer; border-radius: 4px; }
        .slot.active { border: 1px solid #58a6ff; background: #262c36; }
    </style>
</head>
<body>

<div id="iconModal" class="modal">
    <div class="modal-content">
        <h3>見た目の設定</h3>
        
        <p>1. プリセットから選ぶ</p>
        <div id="preset-grid" class="icon-grid"></div>

        <hr style="border:0; border-top:1px solid #30363d; margin:20px 0;">
        
        <p>2. 自分の端末から選ぶ</p>
        <input type="file" id="file-input" accept="image/*" onchange="loadLocalFile(event)">
        
        <button class="btn btn-outline" onclick="closeModal()">キャンセル</button>
    </div>
</div>

<div class="main-layout">
    <div class="panel">
        <h3>パーティ編成</h3>
        <div id="party-list"></div>
    </div>

    <div class="panel" style="text-align: center;">
        <div id="current-icon-display" class="icon-preview" style="zoom: 2;"></div>
        <button class="btn-outline" onclick="openModal()" style="padding: 5px 15px;">見た目を変える</button>
        
        <div style="text-align: left; margin-top: 20px;">
            <label>名前</label>
            <input type="text" id="edit-name" style="width:100%; padding:8px; background:#0d1117; color:white; border:1px solid #30363d;" oninput="updateData()">
        </div>
    </div>

    <div class="panel">
        <h3>ステータス</h3>
        <p>※ここは次のステップで実装します</p>
    </div>
</div>

<script>
    let party = Array(6).fill(null).map((_, i) => ({
        name: `キャラ${i+1}`,
        iconData: "", // DataURLが入る
        spriteIdx: i   // プリセットの番号
    }));
    let currentHeroIdx = 0;

    // スプライトの表示位置を計算（横7人と仮定）
    function getSpritePos(idx) {
        const size = 32;
        const cols = 7; 
        const x = (idx % cols) * size;
        const y = Math.floor(idx / cols) * size;
        return `-${x}px -${y}px`;
    }

    function init() {
        const grid = document.getElementById('preset-grid');
        for(let i=0; i<21; i++) {
            const div = document.createElement('div');
            div.className = 'sprite-item';
            div.style.backgroundPosition = getSpritePos(i);
            div.onclick = () => selectPreset(i);
            grid.appendChild(div);
        }
        render();
    }

    function render() {
        const list = document.getElementById('party-list');
        list.innerHTML = party.map((p, i) => `
            <div class="slot ${i===currentHeroIdx?'active':''}" onclick="currentHeroIdx=${i}; render();">
                <div class="sprite-item" style="${p.iconData ? `background-image:url(${p.iconData}); background-size:cover;` : `background-position:${getSpritePos(p.spriteIdx)};`}"></div>
                <span>${p.name}</span>
            </div>
        `).join('');

        const curr = party[currentHeroIdx];
        document.getElementById('edit-name').value = curr.name;
        const display = document.getElementById('current-icon-display');
        if(curr.iconData) {
            display.style.backgroundImage = `url(${curr.iconData})`;
            display.style.backgroundPosition = "center";
            display.style.backgroundSize = "cover";
        } else {
            display.style.backgroundImage = "url('images/icons/all_icons.png')";
            display.style.backgroundPosition = getSpritePos(curr.spriteIdx);
            display.style.backgroundSize = "auto";
        }
    }

    function updateData() {
        party[currentHeroIdx].name = document.getElementById('edit-name').value;
        render();
    }

    function openModal() { document.getElementById('iconModal').style.display = 'block'; }
    function closeModal() { document.getElementById('iconModal').style.display = 'none'; }

    function selectPreset(idx) {
        party[currentHeroIdx].spriteIdx = idx;
        party[currentHeroIdx].iconData = ""; // プリセットを使うので自作データは消す
        closeModal();
        render();
    }

    function loadLocalFile(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            party[currentHeroIdx].iconData = e.target.result;
            closeModal();
            render();
        };
        reader.readAsDataURL(file);
    }

    init();
</script>
</body>
</html>
