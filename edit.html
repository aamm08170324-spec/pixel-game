<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Pixel Auto RPG - 究極エディタ</title>
    <style>
        body { background: #0d1117; color: #c9d1d9; font-family: sans-serif; padding: 20px; display: flex; justify-content: center; }
        .container { width: 800px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; background: #161b22; padding: 30px; border-radius: 12px; border: 1px solid #30363d; }
        
        /* プレビューエリア */
        .preview-pane { text-align: center; background: #0d1117; padding: 20px; border-radius: 8px; border: 1px solid #30363d; }
        .icon-window { width: 96px; height: 96px; border: 3px solid #58a6ff; margin: 0 auto 15px; overflow: hidden; background: #21262d; display: flex; align-items: center; justify-content: center; position: relative; }
        #view-img { width: 100%; image-rendering: pixelated; transition: 0.1s; }

        /* 入力エリア */
        .input-pane { display: flex; flex-direction: column; gap: 12px; }
        label { font-size: 12px; color: #8b949e; font-weight: bold; }
        input, select, textarea { background: #0d1117; color: white; border: 1px solid #30363d; padding: 10px; border-radius: 6px; width: 100%; box-sizing: border-box; }
        
        /* 切り抜き調整用スライダー */
        .slider-group { background: #21262d; padding: 10px; border-radius: 6px; margin-top: 10px; }
        .btn { padding: 12px; background: #238636; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .btn-sub { background: #21262d; border: 1px solid #30363d; color: #58a6ff; }
    </style>
</head>
<body>

<div class="container">
    <div class="preview-pane">
        <h3>見た目の設定</h3>
        <div class="icon-window">
            <img id="view-img" src="images/icons/all_icons.png" style="width: auto; height: 96px; position: absolute; left: 0;">
        </div>
        
        <label>1. 画像を選択（端末から選ぶ）</label>
        <input type="file" accept="image/*" onchange="loadFile(event)" style="margin-bottom:15px;">

        <div class="slider-group">
            <label>2. 範囲設定（左右にずらす）</label>
            <input type="range" id="x-range" min="0" max="1000" value="0" oninput="moveIcon()">
            <p style="font-size:11px; margin-top:5px;">※20人画像(all_icons.png)を使っている時は、これでキャラを切り替えられます</p>
        </div>
    </div>

    <div class="input-pane">
        <h3>プロフィール設定</h3>
        
        <div><label>名前</label><input type="text" id="p-name" placeholder="勇者あきひさ"></div>
        <div><label>ニックネーム</label><input type="text" id="p-nick" placeholder="伝説の主導者"></div>
        
        <div style="display:flex; gap:10px;">
            <div style="flex:1;"><label>性別</label>
                <select id="p-gender"><option>男</option><option>女</option><option>不明</option></select>
            </div>
            <div style="flex:1;"><label>年齢</label><input type="number" id="p-age" value="20"></div>
        </div>

        <div><label>プロフィール（自己紹介）</label>
            <textarea id="p-bio" rows="4" placeholder="ジョーシンやパソコン工房で鍛えた技術を持つ冒険者。"></textarea>
        </div>

        <button class="btn" onclick="saveData()">設定を保存する</button>
        <p id="msg" style="color:#238636; font-size:12px; text-align:center;"></p>
    </div>
</div>

<script>
    const img = document.getElementById('view-img');
    const xRange = document.getElementById('x-range');

    // 端末から画像を読み込む
    function loadFile(event) {
        const file = event.target.files[0];
        const reader = new FileReader();
        reader.onload = function(e) {
            img.src = e.target.result;
            img.style.width = "100%"; // 読み込んだ画像は枠に合わせる
            img.style.left = "0";
            img.style.height = "auto";
            xRange.disabled = true; // 自作画像の場合はスライダー無効
        };
        reader.readAsDataURL(file);
    }

    // スライダーで画像を横にずらす（切り抜き範囲設定）
    function moveIcon() {
        // 画像の横幅を基準に、左にずらす量を決める
        const offset = xRange.value;
        img.style.left = `-${offset}px`;
    }

    // 保存（ブラウザに一時記録）
    function saveData() {
        const data = {
            name: document.getElementById('p-name').value,
            nick: document.getElementById('p-nick').value,
            gender: document.getElementById('p-gender').value,
            age: document.getElementById('p-age').value,
            bio: document.getElementById('p-bio').value,
            iconLeft: img.style.left,
            iconSrc: img.src
        };
        localStorage.setItem('myRPG_Hero', JSON.stringify(data));
        document.getElementById('msg').innerText = "ブラウザに保存しました！";
    }

    // 読み込み
    window.onload = function() {
        const saved = localStorage.getItem('myRPG_Hero');
        if(saved) {
            const d = JSON.parse(saved);
            document.getElementById('p-name').value = d.name;
            document.getElementById('p-nick').value = d.nick;
            document.getElementById('p-gender').value = d.gender;
            document.getElementById('p-age').value = d.age;
            document.getElementById('p-bio').value = d.bio;
            img.src = d.iconSrc;
            img.style.left = d.iconLeft;
        }
    }
</script>

</body>
</html>
