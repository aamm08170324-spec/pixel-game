<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Pixel Auto RPG - Strategy Menu</title>
    <style>
        body { background: #1a1a2e; color: #e0e0e0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .main-layout { display: grid; grid-template-columns: 250px 1fr 300px; gap: 20px; padding: 20px; width: 95%; max-width: 1400px; }
        
        /* スロット・パーティ一覧 */
        .sidebar { background: #16213e; padding: 15px; border-radius: 10px; border: 1px solid #0f3460; }
        .slot { display: flex; align-items: center; gap: 10px; padding: 10px; margin-bottom: 10px; background: #0f3460; border: 2px solid transparent; cursor: pointer; border-radius: 5px; }
        .slot.active { border-color: #e94560; background: #1a1a2e; }
        .slot-img { width: 40px; height: 40px; background: #333; border-radius: 3px; overflow: hidden; }
        .slot-img img { width: 100%; height: 100%; object-fit: cover; }

        /* キャラクター編集・ジョブ選択 */
        .editor { background: #16213e; padding: 20px; border-radius: 10px; }
        .job-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin: 15px 0; }
        .job-card { border: 1px solid #444; padding: 5px; text-align: center; cursor: pointer; border-radius: 5px; font-size: 12px; }
        .job-card:hover { border-color: #e94560; }
        .job-card.selected { background: #e94560; color: white; border-color: #fff; }
        
        /* ガンビット・装備設定 */
        .strategy { background: #16213e; padding: 20px; border-radius: 10px; }
        .gambit-row { display: flex; gap: 5px; margin-bottom: 8px; font-size: 13px; }
        select, input { background: #0f3460; color: white; border: 1px solid #444; padding: 5px; border-radius: 3px; }
        
        .btn-save { width: 100%; padding: 15px; background: #e94560; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .preview-area { text-align: center; margin-bottom: 20px; background: #000; padding: 10px; border-radius: 10px; border: 2px solid #e94560; }
        
        h3 { border-bottom: 2px solid #e94560; padding-bottom: 5px; margin-top: 0; }
        label { font-size: 12px; color: #888; }
    </style>
</head>
<body>

<h1 style="color: #e94560;">PIXEL AUTO RPG - 準備画面</h1>

<div class="main-layout">
    <div class="sidebar">
        <h3>PARTY</h3>
        <div id="slots"></div>
        <button class="btn-save" style="background:#27ae60;">ダンジョン出発！</button>
    </div>

    <div class="editor">
        <div class="preview-area">
            <canvas id="main-preview" width="120" height="120"></canvas>
            <p id="preview-name" style="font-weight:bold; margin:5px 0;">New Character</p>
        </div>

        <h3>BASIC INFO</h3>
        <div style="display:flex; gap:10px;">
            <div style="flex:1;"><label>名前</label><input type="text" id="name-input" oninput="updateUI()"></div>
            <div style="flex:1;"><label>ニックネーム</label><input type="text" id="nick-input"></div>
        </div>

        <h3>JOB SELECT (見た目)</h3>
        <div class="job-grid" id="job-list">
            </div>

        <h3>CUSTOM ICON</h3>
        <input type="file" id="img-upload" accept="image/*">
        <p style="font-size:11px;">※画像をクリックして顔を切り抜き</p>
        <canvas id="crop-source" style="max-width:100%; border:1px solid #444; margin-top:5px;"></canvas>
    </div>

    <div class="strategy">
        <h3>EQUIPMENT</h3>
        <label>武器</label><select><option>鉄の剣</option><option>木の杖</option></select><br>
        <label>防具</label><select><option>革の鎧</option><option>布の服</option></select>
        
        <h3 style="margin-top:20px;">GAMBIT (作戦)</h3>
        <div id="gambit-list">
            <div class="gambit-row"><span>1.</span><select><option>HP < 50%の味方</option><option>目の前の敵</option></select><select><option>ケアル</option><option>たたかう</option></select></div>
            <div class="gambit-row"><span>2.</span><select><option>目の前の敵</option><option>最もHPが低い敵</option></select><select><option>たたかう</option><option>防御</option></select></div>
            <div class="gambit-row"><span>3.</span><select><option>常時</option></select><select><option>防御</option></select></div>
        </div>
        
        <button class="btn-save" onclick="saveCurrent()">設定を保存</button>
    </div>
</div>

<script>
    let currentId = 0;
    const jobs = ["ナイト", "戦士", "シーフ", "黒魔道士", "白魔道士", "武闘家", "竜騎士", "忍者", "侍", "吟遊詩人", "狩人", "赤魔道士", "魔法戦士", "召喚士", "時魔道士", "踊り子", "薬師", "魔獣使い", "バイキング", "賢者"];
    let party = Array(6).fill(null).map((_, i) => ({ id: i, name: `キャラ${i+1}`, nick: `C${i+1}`, job: "ナイト", icon: null }));

    function init() {
        renderSlots();
        renderJobList();
        loadCharacter(0);
    }

    function renderSlots() {
        const container = document.getElementById('slots');
        container.innerHTML = party.map((p, i) => `
            <div class="slot ${i === currentId ? 'active' : ''}" onclick="loadCharacter(${i})">
                <div class="slot-img">${p.icon ? `<img src="${p.icon}">` : ''}</div>
                <div><div>${p.name}</div><small>${p.job}</small></div>
            </div>
        `).join('');
    }

    function renderJobList() {
        const list = document.getElementById('job-list');
        list.innerHTML = jobs.map(j => `<div class="job-card" onclick="setJob('${j}')">${j}</div>`).join('');
    }

    function loadCharacter(id) {
        currentId = id;
        const p = party[id];
        document.getElementById('name-input').value = p.name;
        document.getElementById('nick-input').value = p.nick;
        updateUI();
        renderSlots();
    }

    function setJob(j) {
        party[currentId].job = j;
        updateUI();
    }

    function updateUI() {
        const name = document.getElementById('name-input').value;
        document.getElementById('preview-name').innerText = `${name || '---'} [${party[currentId].job}]`;
    }

    function saveCurrent() {
        party[currentId].name = document.getElementById('name-input').value;
        party[currentId].nick = document.getElementById('nick-input').value;
        renderSlots();
        alert("キャラクター設定を保存しました！");
    }

    init();
</script>
</body>
</html>
