<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Pixel Auto RPG - Original Edition</title>
    <style>
        /* スタイルは維持しつつ、デザインをさらに微調整 */
        body { background: #0d1117; color: #c9d1d9; font-family: 'Segoe UI', sans-serif; margin: 0; font-size: 13px; }
        .main-layout { display: grid; grid-template-columns: 240px 1fr 400px; gap: 15px; padding: 15px; height: 95vh; }
        .panel { background: #161b22; padding: 15px; border-radius: 8px; border: 1px solid #30363d; overflow-y: auto; }
        
        .slot { display: flex; align-items: center; gap: 10px; padding: 10px; margin-bottom: 10px; background: #21262d; border: 2px solid transparent; cursor: pointer; border-radius: 6px; }
        .slot.active { border-color: #58a6ff; background: #0d1117; }
        .slot-img { width: 40px; height: 40px; background: #30363d; display: flex; align-items: center; justify-content: center; font-size: 24px; border-radius: 4px; }

        .job-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 15px 0; }
        .job-card { border: 1px solid #30363d; padding: 8px; text-align: center; cursor: pointer; border-radius: 5px; background: #21262d; transition: 0.2s; }
        .job-card:hover { border-color: #58a6ff; }
        .job-card.selected { background: #238636; border-color: #7ee787; font-weight: bold; }
        
        .equip-group { display: flex; gap: 10px; margin-bottom: 15px; background: #0d1117; padding: 10px; border-radius: 5px; border: 1px solid #30363d; }

        .gambit-row { display: grid; grid-template-columns: 25px 1.2fr 1fr; gap: 5px; margin-bottom: 6px; align-items: center; }
        select { background: #0d1117; color: #c9d1d9; border: 1px solid #30363d; padding: 6px; border-radius: 4px; font-size: 11px; }
        
        .btn { width: 100%; padding: 12px; background: #238636; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn:hover { background: #2ea043; }
        
        .preview { text-align: center; background: linear-gradient(180deg, #161b22 0%, #0d1117 100%); padding: 20px; border-radius: 8px; border: 1px solid #58a6ff; margin-bottom: 15px; }
        h3 { margin: 0 0 10px 0; color: #58a6ff; border-bottom: 1px solid #30363d; padding-bottom: 5px; font-size: 14px; text-transform: uppercase; }
        input[type="text"] { width: 92%; background: #0d1117; color: white; border: 1px solid #30363d; padding: 8px; border-radius: 4px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="main-layout">
    <div class="panel">
        <h3>編成ユニット</h3>
        <div id="slots"></div>
        <button class="btn" style="background:#8957e5; margin-top:20px;">作戦開始（準備完了）</button>
    </div>

    <div class="panel">
        <div class="preview">
            <div id="job-icon-disp" style="font-size:60px; margin-bottom: 10px;">🛡️</div>
            <p id="preview-info" style="font-size:18px; font-weight:bold;">---</p>
        </div>
        
        <h3>基本設定</h3>
        <input type="text" id="name-in" placeholder="ユニット名" oninput="sync()">
        
        <h3>クラス選択</h3>
        <div class="job-grid" id="job-list"></div>

        <h3>装備スロット</h3>
        <div class="equip-group">
            <div style="flex:1;">
                <label>主兵装</label>
                <select id="wp-right"><option>竜殺しの大剣</option><option>名刀・十六夜</option><option>閃光の細剣</option></select>
            </div>
            <div style="flex:1;">
                <label id="label-left">副兵装</label>
                <select id="wp-left"></select>
            </div>
        </div>
    </div>

    <div class="panel">
        <h3>自動行動ロジック (GAMBIT)</h3>
        <div id="gambit-container"></div>
        <button class="btn" onclick="save()">クラウド同期保存</button>
    </div>
</div>

<script>
    // 完全オリジナルスキル名に書き換え！
    const jobData = {
        "剣聖": { 
            icon: "⚔️", 
            skills: ["通常攻撃", "迅雷・一閃突き", "不動の虚空斬", "極光・天砕波", "神速二連斬"], 
            dual: true 
        },
        "重騎士": { 
            icon: "🛡️", 
            skills: ["通常攻撃", "鉄壁の構え", "献身の守護", "渾身の盾打"], 
            dual: false 
        },
        "聖導師": { 
            icon: "⚕️", 
            skills: ["通常攻撃", "ヒールオーラ", "浄化の風", "再起の福音", "防護の結界"], 
            dual: false 
        },
        "魔導師": { 
            icon: "🔮", 
            skills: ["通常攻撃", "紅蓮の劫火", "凍結の波動", "紫電の奔流", "終焉の隕石"], 
            dual: false 
        },
        "潜伏者": { 
            icon: "👤", 
            skills: ["通常攻撃", "影縫いの矢", "隠密の極意", "毒蛇の牙", "幻影の身代わり"], 
            dual: true 
        },
        "狂戦士": { 
            icon: "🪓", 
            skills: ["通常攻撃", "激昂の咆哮", "荒れ狂う一撃", "不屈の闘志"], 
            dual: false 
        }
    };

    let currentId = 0;
    let party = Array(6).fill(null).map((_, i) => ({
        name: `Unit-${i+1}`, job: "重騎士", 
        gambits: Array(10).fill({target: "目の前の敵", action: "通常攻撃"})
    }));

    function init() {
        const list = document.getElementById('job-list');
        Object.keys(jobData).forEach(j => {
            const div = document.createElement('div');
            div.className = 'job-card';
            div.innerText = j;
            div.onclick = () => selectJob(j);
            list.appendChild(div);
        });
        
        const gContainer = document.getElementById('gambit-container');
        for(let i=0; i<10; i++) {
            gContainer.innerHTML += `
                <div class="gambit-row">
                    <span>${i+1}</span>
                    <select><option>正面の敵</option><option>弱っている味方</option><option>強敵（BOSS）</option><option>自分自身</option></select>
                    <select id="action-${i}"></select>
                </div>`;
        }
        refresh();
    }

    function selectJob(j) {
        party[currentId].job = j;
        refresh();
    }

    function refresh() {
        const p = party[currentId];
        const jInfo = jobData[p.job];
        
        document.getElementById('name-in').value = p.name;
        document.getElementById('preview-info').innerText = `${p.name} / ${p.job}`;
        document.getElementById('job-icon-disp').innerText = jInfo.icon;

        const leftSelect = document.getElementById('wp-left');
        const leftLabel = document.getElementById('label-left');
        if(jInfo.dual) {
            leftLabel.innerText = "副兵装 (二刀流)";
            leftSelect.innerHTML = `<option>妖刀・村正</option><option>ミスリルダガー</option><option>風切りの短剣</option>`;
        } else {
            leftLabel.innerText = "副兵装 (防具)";
            leftSelect.innerHTML = `<option>黒銀の円盾</option><option>聖騎士の盾</option><option>魔力の籠手</option>`;
        }

        for(let i=0; i<10; i++) {
            const sel = document.getElementById(`action-${i}`);
            sel.innerHTML = jInfo.skills.map(s => `<option>${s}</option>`).join('');
        }

        const sCont = document.getElementById('slots');
        sCont.innerHTML = party.map((p, i) => `
            <div class="slot ${i===currentId?'active':''}" onclick="currentId=${i};refresh();">
                <div class="slot-img">${jobData[p.job].icon}</div>
                <div><b>${p.name}</b><br><small>${p.job}</small></div>
            </div>`).join('');
    }

    function sync() {
        party[currentId].name = document.getElementById('name-in').value;
        document.getElementById('preview-info').innerText = `${party[currentId].name} / ${party[currentId].job}`;
    }

    function save() {
        alert("設定を保存しました。これでスクエニさんも安心（？）なオリジナル仕様です！");
    }

    init();
</script>
</body>
</html>
