<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Auto RPG - Title</title>
    <style>
        body {
            background: #0d1117;
            color: #c9d1d9;
            font-family: 'Segoe UI', sans-serif;

            display: flex;

            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        .title-container {
            text-align: center;

        .menu-button {
            display: block;
            width: 250px;
            padding: 15px;

            text-decoration: none;
            border: 1px solid #30363d;
            border-radius: 6px;
            font-weight: bold;
            transition: 0.3s;
            cursor: pointer;

        .menu-button:hover {
            background: #238636;
            color: white;

            transform: scale(1.05);
