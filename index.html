<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Auto RPG - Title</title>
    <style>
        body { background: #0d1117; color: #c9d1d9; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .title-container { text-align: center; border: 2px solid #58a6ff; padding: 50px; border-radius: 20px; background: rgba(22, 27, 34, 0.8); box-shadow: 0 0 30px rgba(88, 166, 255, 0.2); }
        h1 { font-size: 42px; color: #58a6ff; margin-bottom: 30px; text-shadow: 2px 2px 0px #000; }
        .menu-list { display: flex; flex-direction: column; gap: 15px; }
        .menu-button {
            width: 280px; padding: 15px; background: #21262d; color: #58a6ff; 
            text-decoration: none; border: 1px solid #30363d; border-radius: 6px; 
            font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 16px;
        }
        .menu-button:hover { background: #238636; color: white; transform: scale(1.05); }
        .menu-button:disabled { opacity: 0.3; cursor: not-allowed; }
        .footer { position: absolute; bottom: 20px; font-size: 12px; color: #484f58; }
    </style>
</head>
<body>

<div class="title-container">
    <h1>Pixel Auto RPG</h1>
    <div id="menu" class="menu-list">
        </div>
</div>

<div class="footer">Developed by Akihisa | Save Slot: Max 3</div>

<script>
    // セーブデータの確認（スロット1〜3のいずれかにデータがあるか）
    const hasSaveData = () => {
        return localStorage.getItem('rpg_slot_1') || 
               localStorage.getItem('rpg_slot_2') || 
               localStorage.getItem('rpg_slot_3');
    };

    function renderMenu() {
        const menu = document.getElementById('menu');
        menu.innerHTML = ''; // クリア

        const btnNew = `<button class="menu-button" onclick="startNewGame()">はじめから</button>`;
        const btnCont = `<button class="menu-button" onclick="loadGame()" ${!hasSaveData() ? 'disabled' : ''}>続きから</button>`;
        const btnNote = `<a href="https://note.com/" target="_blank" class="menu-button" style="font-size:12px;">開発記を読む (note)</a>`;

        // データがある場合は「続きから」が上
        if (hasSaveData()) {
            menu.innerHTML = btnCont + btnNew + btnNote;
        } else {
            menu.innerHTML = btnNew + btnCont + btnNote;
        }
    }

    function startNewGame() {
        // 空きスロットを探す
        let targetSlot = null;
        for (let i = 1; i <= 3; i++) {
            if (!localStorage.getItem(`rpg_slot_${i}`)) {
                targetSlot = i;
                break;
            }
        }

        if (!targetSlot) {
            alert("セーブスロットがいっぱいです。続きから始めて上書きするか、ブラウザのキャッシュをクリアしてください。");
            return;
        }

        // 新規データの初期値（仮）
        const initialData = { slotId: targetSlot, progress: 0, party: [] };
        localStorage.setItem(`rpg_slot_${targetSlot}`, JSON.stringify(initialData));
        
        // 編成画面へ移動
        window.location.href = 'edit.html';
    }

    function loadGame() {
        // 本来はここでスロット選択画面を出しますが、今回は一旦editへ
        window.location.href = 'edit.html';
    }

    // 初回実行
    renderMenu();
</script>
</body>
</html>
